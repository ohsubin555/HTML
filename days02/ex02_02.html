<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 13. 오전 9:24:07</title>
<link rel="shortcut icon" type="image/x-icon"
	href="/webPro/images/SiSt.ico">
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
/* css */
#team2 {
	border: 1px solid gray;
}

.teamleader {
	background-color: black;
}
</style>
<script>
	
</script>
</head>
<body>
	<!-- span 태그  
     ㄴ 인라인 모드
     ㄴ 특정 시각적 기능 x
     ㄴ 컨테이너 역할 
     
-->
	<span id="team1"> 1조 - <span class="teamleader">양인석</span> <span>안정빈</span>
		<span>신창만</span> <span>이지훈</span> <span>장미성</span>
	</span>

	<br>

	<span id="team2"> 2조 - <span class="teamleader">류호훈</span> <span>오수빈</span>
		<span>이시연</span> <span>조지훈</span> <span style="display: none;">문규리</span>
	</span>


	<br>
	<!--
javascript: [js] 버튼을 클릭 (click) 할때 클릭이벤트를 처리할 수 있어야 한다. 
요소의 on 이벤트명 속성으로 이벤트 처리한다. 

window.alert('클릭이벤트 발생!!!')
 -->
	<button type="button">1조 숨기기</button>
	<button>1조 보이기</button>

	<br>
	<button>2조 보이기/숨기기</button>
	<br>
	<button>팀장의 글자색을 빨강으로변경하기</button>

	<script>
		//jquert selector: button: first
		$("button:first").click(function() {

			// alert("클릭이벤트 확인 ")
			$("#team1").hide();
		});

		$("button").eq(1).click(function() {

			// alert("클릭이벤트 확인 ")
			$("#team1").show();
		});
		$("button").eq(2).click(function() {

			// alert("클릭이벤트 확인 ")
			$("#team2").toggle();
		});
		$("button").last().click(function() {

			$(".teamleader").css("color", "red");
		});
	</script>

</body>
</html>
