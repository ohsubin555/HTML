<script>
  // 1. 산술연산자 +  -  * /  %
  document.write( 5 + 3); document.write("<br>");
  document.write( 5 - 3); document.write("<br>");
  document.write( 5 * 3); document.write("<br>");
  document.write( 2 ** 3); document.write("<br>"); // 8   2**3
  document.write( 5 / 3); document.write("<br>"); // java  1    js  1.66666667
  //   나머지 연산자, 함수
  document.write( 5 % 3); document.write("<br>"); // 2  
 
  document.write( 5 / 0); document.write("<br>"); // Infinity
  document.write( 5.0 / 0); document.write("<br>");// Infinity
  
  document.write( 5 % 0); document.write("<br>");  // NaN == Not a Number
  document.write( 5.0 % 0); document.write("<br>");// NaN
  
  // 2. 증감연산자
  let n = 10;
  document.write( n++ ); document.write("<br>");// 10
  document.write( ++n ); document.write("<br>");// 12
  document.write( n-- ); document.write("<br>");// 12
  document.write( --n ); document.write("<br>");// 10
  
  //  + 문자열 연결 연산자  "53"
  document.write( "5" + 3 ); document.write("<br>");// 10
  document.write( "헬로우" + 3 ); document.write("<br>");// 10
