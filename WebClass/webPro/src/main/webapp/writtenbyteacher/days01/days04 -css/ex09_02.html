<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 21. 오후 2:16:29</title>
<link rel="shortcut icon" type="image/x-icon" href="/webPro/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
  ul{
    margin-left: 20px;
    color: blue;
  }
  
  ul > li{
    cursor: default;
  }
  
  span{
    color: red;
  }
</style>
</head>
<body>
<!-- https://jquery.com/download/ 롤오버 효과 -->
<!-- ul>li*4>lorem1 -->
<ul>
	<li>Lorem.</li>
	<li>Tenetur.</li>
	<li>Harum.</li>
	<li>Est.</li>
</ul>

<script>
  // jq
  $("ul > li").hover(
		  // mouseover
		  function (){
			  // js: createElement(), appendChild()
			  // jq:                  append()
			  $(this).append($("<span>***</span>"))
		  },
		  // mouseout
		  function (){
			  // 추가된 <span>***</span> 요소를 제거..
			  // find(), last(), remove(): jq method
			  $(this).find("span").last().remove();
			  // $("li > span:last-child")
		  }
		  );
</script>
</body>
