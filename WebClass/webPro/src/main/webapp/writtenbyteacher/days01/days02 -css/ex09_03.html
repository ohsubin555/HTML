     */
     
     /* 각 라인마다 끝에 단어 끊어서 출력 */

     /* 한 단어를 최대한 유지하다가, 더 이상 공간이 없으면 단어를 끊어서 
     다음 라인으로 줄바꿈.. */
     /* word-wrap: break-wrap; 예전 코딩 X */
     overflow-wrap: break-word;
  }
  
  h1{
