<!-- 
      [아이콘] 찜하기, 벌점(평점)주기
      1. html 페이지에  쉽게 아이콘 추가 방법
        1) font awesome 아이콘 라이브러리
           - https://fontawesome.com/         로그인
           - <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
           - font awesome 튜토리얼
           - 설치 X, 다운로드 X
        2)
        3)  
     2. 인라인모드의 요소( span, i )를 추가하면 된다.    
 -->
 
 <!-- i[class='fas fa-']*5 -->
<i class="fas fa-cloud"></i>
<i id="heart" class="fas fa-heart" style="color:red; font-size: 30px"></i>
<i class="fas fa-car"></i>
<i class="fas fa-file"></i>
<i class="fas fa-bars"></i>

<script>
   // js
   document.querySelector("#heart").addEventListener("click", function (){
	// this.style.color :  style="color:색상" 직접 지정한 색상만 얻어온다
	// getComputedStyle(this).color: css포함한 실제 화면에 적용된 최종 색상을 얻어온다.
	   
	if (this.style.color == "black") {
		this.style.color = "red";
		this.style.fontSize = "32px";
	} else {
		this.style.color = "black";
		this.style.fontSize = "16px";
	}	   
   });
</script> 
</body>
