<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 20. 오전 11:30:58</title>
<link rel="shortcut icon" type="image/x-icon" href="/webPro/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
</style>
</head>
<body>
<label for="itemCount">항목수: </label>
<select id="itemCount">
  <option>선택...</option>  
</select>
<div id="output">
</div>

<script>
 document.body.onload = function (){
   const icSel = document.querySelector("#itemCount");
   const output = document.querySelector("#output");
   // 1. option 요소를 동적 생성:  Option(text, value)
   /* 첫 번째 방법( 권장 )
   // <option value="1">1개</option> 
   const opt = new Option("1개", 1);
   icSel.add(opt);
   */
   /* 두 번째 방법
   const option = document.createElement("option");
   option.value = "1";
   option.text = "1개";
   select.appendChild(option);
   */

   // 1-2.
   for (var i = 1; i <= 15; i++) {
	   const opt = new Option(`${i}개`, i);
	   icSel.add(opt);
   } // for
   
   // 2. select 태그의 하나의 option을 선택할 때 선택한 옵션의 value 속성값
   // 을 얻어오는 방법(코딩): change 이벤트 발생
   icSel.addEventListener("change", function (){
	  //  alert( this.value );
	  /* 1번 풀이
	  var content= "";
	  for (var i = 1; i <= this.value; i++) {
		content += `${i}: <input type="text"><br>`;
	  } // for
	  output.innerHTML = content;
	  */
	  
	  for (var i = 1; i <= this.value; i++) {
		 var no = document.createTextNode(`${i}: `);
		 output.appendChild(no);
		 // <input type="text">
		 var input = document.createElement("input");
		 input.type = "text";		 
		 output.appendChild(input);
		 // <br>
		 var br = document.createElement("br");
		 output.appendChild(br);
	  } // for
	  
	  
   });
   
   /* 
   1: <input type="text"><br>
   2: <input type="text"><br>
   3: <input type="text"><br>
   */
 }
</script>
</body>
</html>
