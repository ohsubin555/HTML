<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 20. 오후 2:17:40</title>
<link rel="shortcut icon" type="image/x-icon" href="/webPro/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
  .container{
    position: relative;
  }
  
  .blackbox{
    position: relative;
    background-color: black;
    color:white;
    
    height: 100px;
    margin: 30px; 
    
     z-index: 1;
  }
  .graybox{
  
    background-color: gray;
    
    height: 60px;
    width:70%;
    
    position: absolute;
    left:50px;
    top:50px;
 
    z-index: 3;
  }
  .greenbox{
    /* block 모드는 width속성값은 100% 이지만
       position: absolute; 로 설정하면 너비는 내용만큼 너비가 설정된다.
    */
    position: absolute;
    left:270px;
    top:-15px;
    
    background-color: green;    
    height: 100px;
 
    z-index: -1;
  }
</style>
</head>
<body>
<!-- 요소를 배치하다보면
     다른 요소와 겹쳐지는 경우가 있다.
     z-index 속성으로 겹쳐지는 순서를 지정할 수 있다.
     양수: 위
     음수: 아래 
 -->
<!-- #container>div[class=?box]*3>{ Box} -->
<div class="container">
	<div class="blackbox">Black Box</div>
	<div class="graybox">Gray Box</div>
	<div class="greenbox">Green Box</div>
</div>

</body>
</html>
