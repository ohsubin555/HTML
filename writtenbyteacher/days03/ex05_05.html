<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 20. 오후 12:30:38</title>
<link rel="shortcut icon" type="image/x-icon" href="/webPro/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
 .box{
    border:1px solid gray;
    width: 100px;
    height: 100px;
    text-align: center;
  }
  
  /* div:first-child{} */
  /* div:first-of-type{} */
  div:nth-of-type(1){
    background-color: red;
    position: static; /* 정적 */
  }
  
  div:nth-of-type(2){
    background-color: green;
    position: relative; /* 상대적인 */
    left: 20px;
    top: 20px;
  }
  
  div:nth-of-type(3){
    background-color: blue;
    position: fixed; /* 고정 */
    right: 20px;
    bottom: 20px;
  }
  
  /* div:nth-of-type(5){ */
  div:last-of-type{
    background-color: yellow;
    
    position: absolute;
    left: 50px;
    top: 25px;
    
    z-index: -1;
  }
</style>
</head>
<body>


<script>
  // js
  for (var i = 1; i <= 5; i++) {
	const div = document.createElement("div");
	div.innerText = `Box - ${i}`;
	div.classList.add("box");
	document.body.appendChild( div );
  } // for
</script>
</body>
</html>
