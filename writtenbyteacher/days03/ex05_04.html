<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
</style>

<body>

<label for="itemCount">항목수: </label>
<select id="itemCount">
  <option>선택...</option>  
</select>
<div id="output">
</div>

<script>
  // ex05_03.html를 jq 사용해서 수정.
  for (var i = 1; i <= 15; i++) {
	//  <option value="1">1개</option>
	$("#itemCount").append( $("<option></option>").val(i).text(`${i}개`) );
  } // for
  
  $("#itemCount").on("change", function (){
	  // 1. 이전 요소는 모두 제거.
	   $("#output").empty();
	  // $("#output").children().remove();	  
	  
	  // alert( $(this).val() );
	  for (var i = 1; i <= $(this).val() ; i++) {
		 // 1: <input type="text"><br>
		 $("#output")
		    .append(`${i}: `)
		    .append($('<input>').attr('type','text'))
		    .append("<br>");
	  }// for
  });
</script>
</body>
</html>
