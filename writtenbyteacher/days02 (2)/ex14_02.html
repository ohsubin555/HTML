<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026. 7. 16. 오후 5:15:32</title>
<link rel="shortcut icon" type="image/x-icon" href="/webPro/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
  .pagination{
    /* border: 1px solid red; */     
    width: 50%;
    margin: 0 auto;
    
    display: flex;
    justify-content: center;   /* 가운데 정렬 */
    align-items: center;       /* 수직 가운데 */
    gap: 5px;                  /* 버튼 사이 간격 */
  }
  .pagination a{
    text-decoration: none;
    color: black;
    
    width: 40px;
    height: 40px;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: all .3s;
    /* <a> 태그는 기본적으로 inline 요소라서 width, height가 제대로 적용되지
     않는다. 또한 숫자가 버튼의 정중앙에 오지 않는다. */
    display:flex;
    justify-content:center;
    align-items:center;
  }
  
  .pagination a:not(.active):hover{
    color: #ddd;
  }
  
  .pagination a.active{
    background-color: dodgerblue;
    color:white;
    border-color: dodgerblue;
  }
</style>
</head>
<body>
<h3>CSS 페이징 처리 블럭 구현.</h3>

<!-- .pagination>a[href=$]*11>{$} -->
<div class="pagination">
	<a href="1">1</a>
	<a href="2">2</a>
	<a href="3">3</a>
	<a href="4">4</a>
	<a href="5">5</a>
	<a href="6">6</a>
	<a href="7">7</a>
	<a href="8" class="active">8</a>
	<a href="9">9</a>
	<a href="10">10</a>
	<a href="11">▶</a> 
</div>

</body>
</html>
